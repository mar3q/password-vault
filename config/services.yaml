# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: false
        autoconfigure: false

    # --- Shared :: Infrastructure (buses) ---

    App\Shared\Infrastructure\Bus\MessengerCommandBus:
        arguments:
            $messageBus: '@command.bus'

    App\Shared\Infrastructure\Bus\MessengerQueryBus:
        arguments:
            $messageBus: '@query.bus'

    # --- Shared :: Port bindings ---

    App\Shared\Application\Port\CommandBus:
        alias: App\Shared\Infrastructure\Bus\MessengerCommandBus

    App\Shared\Application\Port\QueryBus:
        alias: App\Shared\Infrastructure\Bus\MessengerQueryBus

    # --- Shared :: Controllers ---

    App\Shared\Presentation\Controller\HealthController:
        tags: ['controller.service_arguments']
        public: true

    App\Shared\Presentation\Controller\LoginController:
        tags: ['controller.service_arguments']
        public: true

    # --- Identity :: Infrastructure (adapters) ---

    App\Identity\Infrastructure\Persistence\DoctrineUserRepository:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'

    App\Identity\Infrastructure\EventDispatcher\MessengerEventDispatcher:
        arguments:
            $messageBus: '@event.bus'
            $logger: '@logger'

    App\Identity\Infrastructure\Security\SymfonyPasswordHasher: ~

    App\Identity\Infrastructure\Security\DoctrineUserProvider:
        arguments:
            $userRepository: '@App\Identity\Domain\Port\UserRepository'

    App\Identity\Infrastructure\Notification\LoggingEmailNotifier:
        arguments:
            $logger: '@logger'

    # --- Identity :: Port bindings ---

    App\Identity\Domain\Port\UserRepository:
        alias: App\Identity\Infrastructure\Persistence\DoctrineUserRepository

    App\Identity\Domain\Port\EventDispatcher:
        alias: App\Identity\Infrastructure\EventDispatcher\MessengerEventDispatcher

    App\Identity\Application\Port\PasswordHasher:
        alias: App\Identity\Infrastructure\Security\SymfonyPasswordHasher

    App\Identity\Application\Port\EmailNotifier:
        alias: App\Identity\Infrastructure\Notification\LoggingEmailNotifier

    # --- Identity :: Command Handlers ---

    App\Identity\Application\Command\RegisterUser\RegisterUserHandler:
        arguments:
            $userRepository: '@App\Identity\Domain\Port\UserRepository'
            $passwordHasher: '@App\Identity\Application\Port\PasswordHasher'
            $eventDispatcher: '@App\Identity\Domain\Port\EventDispatcher'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Identity\Application\Command\ChangeEmail\ChangeEmailHandler:
        arguments:
            $userRepository: '@App\Identity\Domain\Port\UserRepository'
            $eventDispatcher: '@App\Identity\Domain\Port\EventDispatcher'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Identity\Application\Command\ChangePassword\ChangePasswordHandler:
        arguments:
            $userRepository: '@App\Identity\Domain\Port\UserRepository'
            $passwordHasher: '@App\Identity\Application\Port\PasswordHasher'
            $eventDispatcher: '@App\Identity\Domain\Port\EventDispatcher'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    # --- Identity :: Query Handlers ---

    App\Identity\Application\Query\GetUserById\GetUserByIdHandler:
        arguments:
            $userRepository: '@App\Identity\Domain\Port\UserRepository'
        tags:
            - { name: messenger.message_handler, bus: query.bus }

    # --- Identity :: Event Listeners ---

    App\Identity\Application\EventListener\SendWelcomeEmailOnUserRegistered:
        arguments:
            $emailNotifier: '@App\Identity\Application\Port\EmailNotifier'
        tags:
            - { name: messenger.message_handler, bus: event.bus, handles: App\Identity\Domain\Event\UserRegistered }

    # --- Identity :: Console Commands ---

    App\Identity\Presentation\Console\CreateUserCommand:
        arguments:
            $commandBus: '@App\Shared\Application\Port\CommandBus'
        tags: ['console.command']

    # --- Identity :: Controllers ---

    App\Identity\Presentation\Controller\RegisterUserController:
        arguments:
            $commandBus: '@App\Shared\Application\Port\CommandBus'
        tags: ['controller.service_arguments']
        public: true

    App\Identity\Presentation\Controller\GetUserController:
        arguments:
            $queryBus: '@App\Shared\Application\Port\QueryBus'
        tags: ['controller.service_arguments']
        public: true

    App\Identity\Presentation\Controller\ChangeEmailController:
        arguments:
            $commandBus: '@App\Shared\Application\Port\CommandBus'
        tags: ['controller.service_arguments']
        public: true

    App\Identity\Presentation\Controller\ChangePasswordController:
        arguments:
            $commandBus: '@App\Shared\Application\Port\CommandBus'
        tags: ['controller.service_arguments']
        public: true

    # --- Vault :: Infrastructure (adapters) ---

    App\Vault\Infrastructure\Persistence\DoctrineVaultEntryRepository:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'

    App\Vault\Infrastructure\Encryption\SodiumEncrypter:
        arguments:
            $encryptionKey: '%env(VAULT_ENCRYPTION_KEY)%'

    # --- Vault :: Port bindings ---

    App\Vault\Domain\Port\VaultRepository:
        alias: App\Vault\Infrastructure\Persistence\DoctrineVaultEntryRepository

    App\Vault\Domain\Port\Encrypter:
        alias: App\Vault\Infrastructure\Encryption\SodiumEncrypter

    # --- Vault :: Command Handlers ---

    App\Vault\Application\Command\CreateEntry\CreateEntryHandler:
        arguments:
            $vaultRepository: '@App\Vault\Domain\Port\VaultRepository'
            $encrypter: '@App\Vault\Domain\Port\Encrypter'
            $eventDispatcher: '@App\Identity\Domain\Port\EventDispatcher'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Vault\Application\Command\UpdateEntry\UpdateEntryHandler:
        arguments:
            $vaultRepository: '@App\Vault\Domain\Port\VaultRepository'
            $encrypter: '@App\Vault\Domain\Port\Encrypter'
            $eventDispatcher: '@App\Identity\Domain\Port\EventDispatcher'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    App\Vault\Application\Command\DeleteEntry\DeleteEntryHandler:
        arguments:
            $vaultRepository: '@App\Vault\Domain\Port\VaultRepository'
            $eventDispatcher: '@App\Identity\Domain\Port\EventDispatcher'
        tags:
            - { name: messenger.message_handler, bus: command.bus }

    # --- Vault :: Query Handlers ---

    App\Vault\Application\Query\GetEntryById\GetEntryByIdHandler:
        arguments:
            $vaultRepository: '@App\Vault\Domain\Port\VaultRepository'
            $encrypter: '@App\Vault\Domain\Port\Encrypter'
        tags:
            - { name: messenger.message_handler, bus: query.bus }

    App\Vault\Application\Query\ListEntries\ListEntriesHandler:
        arguments:
            $vaultRepository: '@App\Vault\Domain\Port\VaultRepository'
            $encrypter: '@App\Vault\Domain\Port\Encrypter'
        tags:
            - { name: messenger.message_handler, bus: query.bus }

    # --- Vault :: Console Commands ---

    App\Vault\Presentation\Console\GetPasswordCommand:
        arguments:
            $userRepository: '@App\Identity\Domain\Port\UserRepository'
            $queryBus: '@App\Shared\Application\Port\QueryBus'
        tags: ['console.command']

    App\Vault\Presentation\Console\ExportEntriesCommand:
        arguments:
            $userRepository: '@App\Identity\Domain\Port\UserRepository'
            $queryBus: '@App\Shared\Application\Port\QueryBus'
        tags: ['console.command']

    # --- Vault :: Controllers ---

    App\Vault\Presentation\Controller\CreateEntryController:
        arguments:
            $commandBus: '@App\Shared\Application\Port\CommandBus'
            $security: '@security.helper'
        tags: ['controller.service_arguments']
        public: true

    App\Vault\Presentation\Controller\GetEntryController:
        arguments:
            $queryBus: '@App\Shared\Application\Port\QueryBus'
            $security: '@security.helper'
        tags: ['controller.service_arguments']
        public: true

    App\Vault\Presentation\Controller\ListEntriesController:
        arguments:
            $queryBus: '@App\Shared\Application\Port\QueryBus'
            $security: '@security.helper'
        tags: ['controller.service_arguments']
        public: true

    App\Vault\Presentation\Controller\UpdateEntryController:
        arguments:
            $commandBus: '@App\Shared\Application\Port\CommandBus'
            $security: '@security.helper'
        tags: ['controller.service_arguments']
        public: true

    App\Vault\Presentation\Controller\DeleteEntryController:
        arguments:
            $commandBus: '@App\Shared\Application\Port\CommandBus'
            $security: '@security.helper'
        tags: ['controller.service_arguments']
        public: true
