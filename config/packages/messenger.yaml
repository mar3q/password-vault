framework:
    messenger:
        default_bus: command.bus

        buses:
            command.bus: ~
            query.bus: ~
            event.bus:
                default_middleware:
                    allow_no_handlers: true

        transports:
            sync: 'sync://'

        routing:
            App\Identity\Domain\Event\UserRegistered: sync
            App\Identity\Domain\Event\UserEmailChanged: sync
            App\Identity\Domain\Event\UserPasswordChanged: sync
            App\Vault\Domain\Event\EntryCreated: sync
            App\Vault\Domain\Event\EntryUpdated: sync
            App\Vault\Domain\Event\EntryDeleted: sync
